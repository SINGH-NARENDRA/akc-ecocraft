<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKC EcoCraft | Premium Sustainable Bags & Bulk Packaging Solutions</title>
  <meta
    name="description"
    content="AKC EcoCraft manufactures premium, eco-friendly jute and cotton bags for B2B clients, retail packaging, corporate gifting, and bulk export requirements."
  />

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    /* Premium Earthy Color Palette & Typography */
    :root {
      --bg-primary: #fcfbf9;
      --bg-secondary: #f4f1ea;
      --card-bg: #ffffff;
      --text-main: #1c241f;
      --text-muted: #5c6660;
      --accent-green: #1a472a;
      --accent-green-light: #2c6e43;
      --accent-sand: #e8dfd1;
      --border-light: rgba(26, 71, 42, 0.08);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 48px rgba(26, 71, 42, 0.08);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --container-max: 1200px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background: var(--bg-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 90%;
      max-width: var(--container-max);
      margin: 0 auto;
    }

    /* Typography Hierarchy */
    h1, h2, h3, h4 {
      color: var(--accent-green);
      line-height: 1.2;
      font-weight: 700;
    }

    h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: 1.125rem;
      max-width: 600px;
      margin: 0 auto 3rem;
    }

    /* Navigation */
    .topbar {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      transition: var(--transition);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .brand strong {
      font-size: 1.25rem;
      color: var(--accent-green);
      letter-spacing: 0.5px;
    }

    .brand span {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--accent-green);
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--accent-green);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      background: var(--accent-green);
      color: white !important;
      padding: 10px 20px;
      border-radius: 99px;
    }
    
    .nav-cta::after { display: none; }
    .nav-cta:hover { background: var(--accent-green-light); transform: translateY(-2px); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 32px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 1rem;
      transition: var(--transition);
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent-green);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      background: var(--accent-green-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-white {
      background: white;
      color: var(--accent-green);
      box-shadow: var(--shadow-md);
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.15);
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
    }

    /* Hero Section */
    .hero {
      position: relative;
      padding: 180px 0 120px;
      background: linear-gradient(to right, rgba(26, 71, 42, 0.85), rgba(26, 71, 42, 0.7)),
                  url('images/img1.png') center/cover no-repeat;
      color: white;
      min-height: 90vh;
      display: flex;
      align-items: center;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 48px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
      animation: fadeUp 0.8s ease backwards;
    }

    .hero h1 {
      color: white;
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 24px;
      animation: fadeUp 0.8s ease 0.1s backwards;
    }

    .hero p.lead {
      font-size: 1.125rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 36px;
      max-width: 90%;
      animation: fadeUp 0.8s ease 0.2s backwards;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 40px;
      animation: fadeUp 0.8s ease 0.3s backwards;
    }

    .hero-features {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      animation: fadeUp 0.8s ease 0.4s backwards;
    }

    .feature-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .feature-tag i {
      color: #a7d1b3;
    }

    /* B2B Capability Card */
    .b2b-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.2);
      animation: fadeLeft 1s ease 0.3s backwards;
    }

    .b2b-card h3 {
      color: white;
      font-size: 1.5rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .b2b-list {
      list-style: none;
    }

    .b2b-list li {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.9);
    }
    
    .b2b-list li:last-child { margin-bottom: 0; }

    .b2b-list i {
      color: #a7d1b3;
      margin-top: 4px;
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 50%;
    }

    /* Trust Bar */
    .trust-bar {
      background: var(--card-bg);
      padding: 40px 0;
      border-bottom: 1px solid var(--border-light);
      margin-top: -1px; /* fix sub-pixel gap */
      position: relative;
      z-index: 10;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      text-align: center;
    }

    .trust-item strong {
      display: block;
      color: var(--accent-green);
      font-size: 1.125rem;
      margin-bottom: 8px;
    }

    .trust-item span {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Sections General */
    .section {
      padding: 100px 0;
    }

    .bg-alt {
      background: var(--bg-secondary);
    }

    .section-header {
      text-align: center;
      margin-bottom: 64px;
    }

    /* Two Column Layouts (About, Sourcing) */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }

    .split-image {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .split-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 4/5;
      transition: var(--transition);
    }

    .split-image:hover img {
      transform: scale(1.05);
    }

    .split-content h2 {
      text-align: left;
    }

    .split-content p {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 24px;
    }

    .value-props {
      display: grid;
      gap: 16px;
      margin-top: 32px;
    }

    .value-prop {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--card-bg);
      padding: 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .value-prop i {
      color: var(--accent-green);
      font-size: 1.25rem;
      margin-top: 2px;
    }

    .value-prop div strong {
      display: block;
      color: var(--accent-green);
      margin-bottom: 4px;
    }
    
    .value-prop div span {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    /* Products Section */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent-green);
    }

    .product-img {
      height: 260px;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .product-card:hover .product-img img {
      transform: scale(1.08);
    }

    .product-info {
      padding: 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-info h3 {
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    .product-info p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .product-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-green);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .product-link i {
      transition: transform 0.2s;
    }

    .product-card:hover .product-link i {
      transform: translateX(4px);
    }

    /* Applications Section */
    .applications-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .app-card {
      background: var(--card-bg);
      padding: 40px 32px;
      border-radius: var(--radius-md);
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      transition: var(--transition);
    }

    .app-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }

    .app-icon {
      width: 64px;
      height: 64px;
      background: var(--bg-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--accent-green);
      font-size: 1.5rem;
    }

    /* CTA Section */
    .cta-section {
      background: var(--accent-green);
      color: white;
      text-align: center;
      padding: 80px 0;
      border-radius: var(--radius-lg);
      margin: 60px auto;
      width: 90%;
      max-width: var(--container-max);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none"/></svg>') repeat;
      opacity: 0.5;
    }

    .cta-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
    }

    .cta-content h2 {
      color: white;
      margin-bottom: 16px;
    }

    /* Contact Section */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }

    .contact-info-card {
      background: var(--card-bg);
      padding: 48px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-light);
    }

    .contact-method {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom:
